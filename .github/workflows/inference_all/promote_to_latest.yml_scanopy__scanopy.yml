name: Promote Release to Latest
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to promote to latest (e.g., v1.0.0)
        required: true
        type: string
permissions:
  contents: write
  packages: write
  models: read
jobs:
  promote-to-latest:
    name: Promote Release to Latest
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      models: read
    steps:
      - name: Validate release exists and get details
        id: release
        run: >
          RELEASE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN
          }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ inputs.release_tag }}")

          if [ "$(echo $RELEASE | jq -r '.message')" = "Not Found" ]; then
            echo "Release ${{ inputs.release_tag }} not found"
            exit 1
          fi


          echo "Release found: ${{ inputs.release_tag }}"


          # Extract release details for later steps

          echo "release_id=$(echo $RELEASE | jq -r '.id')" >> $GITHUB_OUTPUT

          echo "release_name=$(echo $RELEASE | jq -r '.name')" >> $GITHUB_OUTPUT

          echo "release_url=$(echo $RELEASE | jq -r '.html_url')" >>
          $GITHUB_OUTPUT


          # Handle multiline body

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)

          echo "release_body<<$EOF" >> $GITHUB_OUTPUT

          echo "$RELEASE" | jq -r '.body' >> $GITHUB_OUTPUT

          echo "$EOF" >> $GITHUB_OUTPUT
      - name: Mark release as latest
        run: >
          curl -X PATCH \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/${{ steps.release.outputs.release_id }}" \
            -d '{"make_latest": "true", "prerelease": false, "draft": false}'

          echo "Marked ${{ inputs.release_tag }} as latest release"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-arch manifest for Server (GHCR)
        run: >
          docker buildx imagetools create -t ghcr.io/${{ github.repository
          }}/server:latest \
            ghcr.io/${{ github.repository }}/server:${{ inputs.release_tag }}
      - name: Create multi-arch manifest for Daemon (GHCR)
        run: >
          docker buildx imagetools create -t ghcr.io/${{ github.repository
          }}/daemon:latest \
            ghcr.io/${{ github.repository }}/daemon:${{ inputs.release_tag }}
      - name: Checkout scanopy repo (dev branch for latest fixtures)
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          fetch-tags: true
      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          repository: scanopy/website
          token: ${{ secrets.SYNC_FIXTURES_TO_WEBSITE_TOKEN }}
          path: website
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Copy fixtures to website repo
        run: |
          mkdir -p website/src/lib/fixtures/
          cp ui/static/services.json website/src/lib/fixtures/
          cp ui/src/lib/data/features.json website/src/lib/fixtures/
          cp ui/src/lib/data/billing-plans.json website/src/lib/fixtures/
          cp ui/static/openapi-public.json website/src/lib/fixtures/openapi.json
          cp ui/static/schema.mermaid website/src/lib/fixtures/schema.mermaid
      - name: Generate daemon config fixture
        run: >
          cd ui && npm ci --ignore-scripts

          npx vite-node scripts/export-daemon-field-defs.ts docs >
          ../website/src/lib/fixtures/daemon-config.json
      - name: Get previous release tag
        id: prev_tag
        run: >
          # Get all version tags sorted, find the one before current release

          PREV_TAG=$(git tag -l 'v*' | sort -V | grep -B1 "^${{
          inputs.release_tag }}$" | head -1)

          if [ "$PREV_TAG" = "${{ inputs.release_tag }}" ] || [ -z "$PREV_TAG"
          ]; then
            # Fallback: get the tag before this one by commit order
            PREV_TAG=$(git describe --tags --abbrev=0 ${{ inputs.release_tag }}^ 2>/dev/null || echo "")
          fi

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, using initial commit"
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

          echo "Previous tag: $PREV_TAG"
      - name: Generate commit diff for AI
        id: diff
        run: |
          # Get commits between tags (non-merge commits only)
          # Include hash for potential PR lookup
          COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges \
            ${{ steps.prev_tag.outputs.prev_tag }}..${{ inputs.release_tag }} \
            | head -100)

          # Get merge commits to extract PR numbers
          MERGES=$(git log --pretty=format:"%s" --merges \
            ${{ steps.prev_tag.outputs.prev_tag }}..${{ inputs.release_tag }} \
            | grep -oE '#[0-9]+' | sort -u | tr '\n' ' ')

          # Get contributors
          CONTRIBUTORS=$(git log --pretty=format:"%an" \
            ${{ steps.prev_tag.outputs.prev_tag }}..${{ inputs.release_tag }} \
            | sort -u | grep -v "github-actions" | tr '\n' ', ' | sed 's/,$//')

          # Store for AI prompt
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "commits<<$EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "Related PRs: $MERGES" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

          echo "contributors=$CONTRIBUTORS" >> $GITHUB_OUTPUT
      - name: Generate release notes with AI
        id: ai_notes
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4.1
          system-prompt: >
            You are a technical writer creating release notes for Scanopy, a
            network discovery and topology visualization tool. Write
            user-focused release notes that are informative and helpful.


            Format requirements:

            - Use markdown with ## headers for sections: New Features,
            Improvements, Bug Fixes (only include sections with content)

            - Each item should be a bullet point starting with an action verb
            (Add, Introduce, Improve, Fix, etc.)

            - Each item should be 1-2 sentences explaining WHAT changed and WHY
            it benefits users

            - Format PR/issue references as markdown links:
            ([#123](https://github.com/scanopy/scanopy/pull/123))

            - Combine related commits into single items


            Example of good release note items:

            - Add topology sharing capabilities, allowing users to share network
            maps via direct link or embed code for easier collaboration and
            presentation ([#95](https://github.com/scanopy/scanopy/pull/95)).

            - Improve subnet visualization by optimizing horizontal compression
            and preventing overlap, resulting in clearer network maps
            ([#107](https://github.com/scanopy/scanopy/pull/107)).

            - Fix duplicate host entries that could appear after re-running
            network discovery
            ([#108](https://github.com/scanopy/scanopy/pull/108)).


            Do NOT include:

            - Version bump commits (chore: bump version)

            - Merge commits

            - CI/CD or workflow changes

            - Test-only changes

            - Internal refactoring unless user-visible
          prompt: |
            Generate release notes for Scanopy ${{ inputs.release_tag }}.
            Previous version: ${{ steps.prev_tag.outputs.prev_tag }}
            Repository: https://github.com/scanopy/scanopy

            Commits since last release:
            ${{ steps.diff.outputs.commits }}
      - name: Generate title and social post
        id: social
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4.1
          system-prompt: >
            Generate a title and social media post for a software release.


            Requirements:

            1. TITLE: A short, descriptive title (3-6 words) summarizing the key
            changes. NOT promotional. Examples: "Topology Sharing & Demo Mode",
            "Performance Improvements & Bug Fixes", "Enhanced Network Discovery"


            2. SOCIAL_POST: A short post for Twitter/Bluesky (max 175
            characters). Version number and changelog URL are auto-added, so
            exclude them. Requirements:
               - Use bullet points (•) to list key highlights, formatted as a single string with \n between bullets (e.g., "• First item\n• Second item")
               - Write naturally and clearly - prioritize readability over cramming in content
               - NOT promotional language
               - No version number, hashtags, or URLs

            Output format (exactly like this):

            TITLE: Your Title Here

            SOCIAL_POST: Your social post text here
          prompt: |
            Based on these release notes for Scanopy ${{ inputs.release_tag }}:

            ${{ steps.ai_notes.outputs.response }}
      - name: Parse social outputs
        id: parsed
        run: >
          RESPONSE='${{ steps.social.outputs.response }}'


          # Extract title

          TITLE=$(echo "$RESPONSE" | grep "^TITLE:" | sed 's/^TITLE: //')

          echo "title=$TITLE" >> $GITHUB_OUTPUT


          # Extract social post

          SOCIAL_POST=$(echo "$RESPONSE" | grep "^SOCIAL_POST:" | sed
          's/^SOCIAL_POST: //')

          echo "social_post=$SOCIAL_POST" >> $GITHUB_OUTPUT


          # Get version without v prefix

          VERSION=$(echo "${{ inputs.release_tag }}" | sed 's/^v//')

          echo "version=$VERSION" >> $GITHUB_OUTPUT


          echo "Title: $TITLE"

          echo "Social post: $SOCIAL_POST"
      - name: Create changelog file
        run: >
          mkdir -p website/src/lib/changelog


          cat > website/src/lib/changelog/${{ inputs.release_tag }}.md <<
          'CHANGELOG_EOF'

          ---

          version: ${{ steps.parsed.outputs.version }}

          date: $(date -u +%Y-%m-%d)

          title: ${{ steps.parsed.outputs.title }}

          social_post: ${{ steps.parsed.outputs.social_post }}

          contributors: ${{ steps.diff.outputs.contributors }}

          ---


          ${{ steps.ai_notes.outputs.response }}


          ---


          **Full Changelog**: https://github.com/${{ github.repository
          }}/compare/${{ steps.prev_tag.outputs.prev_tag }}...${{
          inputs.release_tag }}

          CHANGELOG_EOF


          # Fix the date (heredoc doesn't expand $(date))

          sed -i "s/date: \$(date -u +%Y-%m-%d)/date: $(date -u +%Y-%m-%d)/"
          website/src/lib/changelog/${{ inputs.release_tag }}.md
      - name: Commit and push fixtures to website repo
        working-directory: website
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/lib/fixtures/
          if git diff --staged --quiet; then
            echo "No fixture changes to commit"
          else
            git commit -m "chore: sync fixtures from ${{ inputs.release_tag }}"
            git push
          fi
      - name: Create PR for changelog review
        working-directory: website
        env:
          GH_TOKEN: ${{ secrets.SYNC_FIXTURES_TO_WEBSITE_TOKEN }}
        run: >
          BRANCH="changelog/${{ inputs.release_tag }}"


          # Delete remote branch if it exists (from a previous failed run)

          git push origin --delete "$BRANCH" 2>/dev/null || true


          # Create and switch to new branch

          git checkout -b "$BRANCH"


          # Add changelog file

          git add src/lib/changelog/


          # Check if there are changes to commit

          if git diff --staged --quiet; then
            echo "No changelog changes to commit"
            exit 0
          fi


          git commit -m "docs: add release notes for ${{ inputs.release_tag }}"

          git push -u origin "$BRANCH"


          # Create PR with review checklist

          gh pr create \
            --title "Release Notes: ${{ inputs.release_tag }} - ${{ steps.parsed.outputs.title }}" \
            --body "## AI-Generated Release Notes

          This PR contains automatically generated release notes for **${{
          inputs.release_tag }}**.


          ### Preview


          **Title:** ${{ steps.parsed.outputs.title }}


          **Social Post:**

          > ${{ steps.parsed.outputs.social_post }}


          ### Review Checklist


          - [ ] Verify accuracy of feature descriptions

          - [ ] Check categorization (New Features, Improvements, Bug Fixes)

          - [ ] Review the title - should be descriptive, not promotional

          - [ ] Review the social post for Twitter/Bluesky

          - [ ] Edit for clarity and user-focus if needed


          ### What happens on merge


          When you merge this PR, the following will be published automatically:

          - ✅ Changelog added to scanopy.net

          - 📢 Discord notification sent

          - 🐦 Tweet posted to @scanopy

          - 🦋 Post on Bluesky

          - 📱 Post on r/scanopy


          ---

          *Generated with GitHub Models AI*" \
            --base main \
            --head "$BRANCH"

          echo "PR created for changelog review"
